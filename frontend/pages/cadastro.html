<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web/src/regular/style.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/cadastro.css">
  <title>CodeWave - Cadastro</title>
</head>
<body>
  <div class="login-layout">
    <div class="login-left">
      <a href="../index.html" class="logo">
        <svg width="auto" height="18" viewBox="0 0 220 80" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M55 20 L35 40 L55 60" />
            <path d="M70 40 C80 22, 96 22, 110 40 C124 58, 140 58, 150 40" />
            <path d="M165 20 L185 40 L165 60" />
          </g>
        </svg>
      </a>
      <div class="login-left-text">
        <h1>Crie sua conta e<br>comece sua jornada<br>de <span class="destaque-amarelo">aprendizado.</span></h1>
        <p class="login-left-desc">
          <span style="white-space: nowrap;">Tenha acesso a todos os cursos, acompanhe</span><br>
          <span style="white-space: nowrap;">seu progresso e evolua no seu ritmo.</span>
        </p>
      </div>
      <img src="../assets/image/cadastrologinimage.png" alt="Cadastro Image" class="login-img">
    </div>

    <div class="login-right">
      <div class="login-form-wrapper">

        <div class="form-header">
          <div>
            <h2>Crie sua conta</h2>
            <p>Preencha os dados abaixo para começar</p>
          </div>
          <a href="login.html" class="voltar-login">
            <i class="ph ph-caret-left"></i> Voltar para o login
          </a>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nome completo</label>
            <div class="input-wrapper">
              <i class="ph ph-user input-icon"></i>
              <input type="text" placeholder="Seu nome completo">
            </div>
          </div>

          <div class="form-group">
            <label>E-mail</label>
            <div class="input-wrapper">
              <i class="ph ph-envelope input-icon"></i>
              <input type="email" placeholder="seu@email.com">
            </div>
          </div>

          <div class="form-group">
            <label>Senha</label>
            <div class="input-wrapper">
              <i class="ph ph-lock input-icon"></i>
              <input type="password" placeholder="Crie uma senha" id="senha">
              <i class="ph ph-eye-slash input-icon-right" id="toggleSenha"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Confirmar senha</label>
            <div class="input-wrapper">
              <i class="ph ph-lock input-icon"></i>
              <input type="password" placeholder="Confirme sua senha" id="confirmarSenha">
              <i class="ph ph-eye-slash input-icon-right" id="toggleConfirmar"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Data de nascimento</label>
            <div class="input-wrapper">
              <i class="ph ph-calendar input-icon"></i>
              <input type="text" placeholder="DD / MM / AAAA">
            </div>
          </div>

          <div class="form-group">
            <label>País</label>
            <div class="input-wrapper">
              <i class="ph ph-globe input-icon"></i>
              <select id="pais">
                <option value="" disabled selected>Selecione seu país</option>
                <option value="BR">🇧🇷 Brasil</option>
                <option value="US">🇺🇸 Estados Unidos</option>
                <option value="PT">🇵🇹 Portugal</option>
                <option value="AR">🇦🇷 Argentina</option>
                <option value="ES">🇪🇸 Espanha</option>
                <option value="FR">🇫🇷 França</option>
                <option value="DE">🇩🇪 Alemanha</option>
                <option value="IT">🇮🇹 Itália</option>
                <option value="MX">🇲🇽 México</option>
                <option value="CO">🇨🇴 Colômbia</option>
                <option value="CL">🇨🇱 Chile</option>
                <option value="JP">🇯🇵 Japão</option>
                <option value="CN">🇨🇳 China</option>
                <option value="GB">🇬🇧 Reino Unido</option>
                <option value="CA">🇨🇦 Canadá</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-check">
          <input type="checkbox" id="termos">
          <label for="termos">Eu concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.</label>
        </div>

        <button class="btn-login">Criar conta</button>

        <div class="divider">
          <span>ou cadastre-se com</span>
        </div>

        <button class="btn-google">
          <img src="https://www.google.com/favicon.ico" alt="Google" width="18">
          Continuar com Google
        </button>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="../assets/js/cadastro.js"></script>
</body>
</html>
